        function PtoL(feature, latlng) {
            var style = {
                radius: 5,
                opacity: 1,
                color: 'black',
                weight: 0.8,
                fill: true,
                fillOpacity: 0.8,
                fillColor: 'red'
            };
            return L.circleMarker(latlng, style);
        }

        function oEF(feature, layer) {
            var props = feature.properties;
            layer.bindTooltip(
                `<b>${props.name}</b><br>${props['addr:street']} ${props['addr:housenumber']}<br>${props['addr:city']}`,
                { permanent: false }
            );
        }

        var points_layer = L.geoJSON(geojson_points, {
            onEachFeature: oEF,
            pointToLayer: PtoL
        }).addTo(mymap);
		
		
		
		
	L.control.scale().addTo(mymap);
	
var baseLayers = {
    "OpenStreetMap": osm,
    "Ortofotomapa": ortofotomapa
};




var overlays = {
    "Moje punkciki": points_layer,
};

L.control.layers(baseLayers, { "Moje punkciki": points_layer }).addTo(mymap);


	
	
	
	
	
	
	
	
	
	
var results = L.layerGroup().addTo(mymap);

var searchControl = L.control({ position: 'topright' });

searchControl.onAdd = function () {
    var div = L.DomUtil.create('div', 'search-box');
    div.innerHTML = `
        <input type="text" id="search-input" placeholder="Search for places">
        <ul id="search-results" class="autocomplete-results"></ul>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
};

searchControl.addTo(mymap);

document.getElementById('search-input').addEventListener('input', function (e) {
    var query = e.target.value.toLowerCase();
    var resultList = document.getElementById('search-results');
    resultList.innerHTML = ''; 

    var found = geojson_points.features.filter(feature =>
        feature.properties.name.toLowerCase().includes(query)
    );

    if (found.length > 0) {
        found.forEach(function (feature) {
            var listItem = document.createElement('li');
            listItem.textContent = `${feature.properties.name} - ${feature.properties["addr:street"]} ${feature.properties["addr:housenumber"]}`;
            listItem.addEventListener('click', function () {
                var coords = feature.geometry.coordinates;
                var marker = L.marker([coords[1], coords[0]])
                    .bindPopup(`<b>${feature.properties.name}</b><br>${feature.properties["addr:street"]} ${feature.properties["addr:housenumber"]}<br>${feature.properties["addr:city"]}`)
                    .addTo(results)
                    .openPopup();
                mymap.setView([coords[1], coords[0]], 15);
                resultList.innerHTML = ''; 
            });
            resultList.appendChild(listItem);
        });
    }
});
